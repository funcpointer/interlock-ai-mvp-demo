schema_version: interlock_mvp.corpus.v1
name: aes_public_demo_synthetic_revision
description: >
  Public AES transformer specification sheet compared against a clearly
  watermarked synthetic revision generated locally by
  scripts/make_synthetic_transformer_revision.py. This is demo/eval data, not
  a real AES project revision.
source_root: docs/public_aes

pairs:
  - id: public_transformer_spec_synthetic_revision
    mode: version
    doc_a: somerset_main_power_transformer_spec_sheet.pdf
    doc_b: somerset_main_power_transformer_spec_sheet_synth_rev.pdf
    authority_config: ../../examples/aes_authority.yaml
    domain_glossary: ../../examples/aes_glossary.yaml
    eval: ../../eval/public_transformer_spec_synth.yaml
    doc_a_type: specification
    doc_b_type: specification
    no_cloud: true
    no_kuzu: true
    notes: >
      Demo-quality synthetic revision over a real public AES transformer spec.
      Planted changes: 140 MVA -> 120 MVA and 10% impedance -> 8% impedance.
